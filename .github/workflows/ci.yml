name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.6"
      - name: ruff check
        run: ruff check .
      # NOTE: ``ruff format`` is the canonical formatter for new and changed
      # code, but a one-shot reformat of the entire codebase is intentionally
      # deferred to a dedicated commit so it does not bury logic changes.
      # Re-enable once the tree-wide reformat lands.

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -e .[dev]
      - name: mypy
        # Non-blocking for now (gradual typing). Remove `|| true` once the codebase is clean.
        run: mypy src web || true

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    env:
      # Tests run offline with the deterministic dummy embedder.
      USE_DUMMY_EMBED: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      RATE_LIMIT_RPM: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -e .[dev]
      - name: Run tests
        # Cactus FFI requires a built native lib that is not available in CI.
        # ``src/core/tools.py`` and ``src/core/engine.py`` guard their cactus
        # imports so collection succeeds; individual tests that exercise the
        # FFI directly are skipped here until a CI cactus build is wired up.
        run: |
          pytest -q \
            --ignore=tests/unit/test_engine.py \
            --ignore=tests/unit/test_tools.py \
            --ignore=tests/integration/test_routing.py

